<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GqvvsPicks — AI Picks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
:root{
  --red:#e94560;--gold:#f0a500;--green:#2ecc71;--blue:#0f3460;
  --dark:#06060f;--glass:rgba(255,255,255,0.05);--gb:rgba(255,255,255,0.08);
  --gborder:rgba(255,255,255,0.1);
  --gr:0 0 24px rgba(233,69,96,0.45);--gg:0 0 20px rgba(240,165,0,0.35);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--dark);color:#fff;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 15% 15%,rgba(233,69,96,.12) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 85%,rgba(15,52,96,.25) 0%,transparent 55%),
             radial-gradient(ellipse at 50% 0%,rgba(240,165,0,.06) 0%,transparent 45%);
  z-index:0;pointer-events:none}
header{position:relative;z-index:10;text-align:center;padding:32px 20px 0;
  background:linear-gradient(180deg,rgba(233,69,96,.07) 0%,transparent 100%);
  border-bottom:1px solid rgba(233,69,96,.18)}
.logo{font-size:2.6rem;font-weight:900;
  background:linear-gradient(90deg,#e94560,#f0a500,#e94560);background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;letter-spacing:-1px}
@keyframes shimmer{to{background-position:200%}}
.logo-sub{font-size:.7rem;color:#444;letter-spacing:5px;text-transform:uppercase;margin:4px 0 22px}
.stats-bar{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding-bottom:20px}
.sp{background:var(--glass);border:1px solid var(--gborder);backdrop-filter:blur(12px);
  border-radius:50px;padding:8px 20px;display:flex;flex-direction:column;align-items:center;min-width:90px}
.sp .v{font-size:1.4rem;font-weight:700}.sp .l{font-size:.6rem;color:#555;text-transform:uppercase;letter-spacing:1px}
.sp.g .v{color:var(--green)}.sp.p .v{color:#e74c3c}.sp.w .v{color:var(--gold)}
.main-tabs{position:sticky;top:0;z-index:50;display:flex;background:rgba(6,6,15,.95);
  backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px}
.mt{flex:1;padding:14px 10px;text-align:center;font-size:.85rem;font-weight:600;
  color:#555;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;
  background:none;border-top:none;border-left:none;border-right:none;font-family:'Inter',sans-serif}
.mt:hover{color:#aaa}.mt.active{color:var(--red);border-bottom-color:var(--red)}
.layout{display:flex;position:relative;z-index:5;min-height:calc(100vh - 200px)}
.sidebar{width:280px;flex-shrink:0;padding:20px;border-right:1px solid rgba(255,255,255,.05);
  position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;background:rgba(0,0,0,.2)}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-title{font-size:.9rem;font-weight:700;color:#eee}
.cal-btn{background:var(--glass);border:1px solid var(--gborder);color:#aaa;
  width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-btn:hover{background:var(--red);border-color:var(--red);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day-label{text-align:center;font-size:.65rem;color:#444;padding:4px 0;text-transform:uppercase}
.cal-day{text-align:center;padding:6px 4px;border-radius:7px;font-size:.78rem;color:#666;
  cursor:pointer;transition:all .2s;border:1px solid transparent}
.cal-day:hover{background:rgba(233,69,96,.15);color:#fff;border-color:rgba(233,69,96,.3)}
.cal-day.today{color:var(--gold);font-weight:700}
.cal-day.selected{background:var(--red);color:#fff;border-color:var(--red);box-shadow:var(--gr);font-weight:700}
.cal-day.empty{cursor:default}
.date-display{margin-top:16px;padding:12px;background:var(--glass);border:1px solid var(--gborder);
  border-radius:10px;text-align:center;font-size:.8rem;color:#aaa}
.date-display strong{color:var(--gold);display:block;font-size:.95rem;margin-top:2px}
.subnav{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px;
  background:rgba(0,0,0,.3);border-bottom:1px solid rgba(255,255,255,.04)}
.sn{padding:6px 14px;border-radius:50px;border:1px solid rgba(255,255,255,.1);
  background:transparent;color:#555;cursor:pointer;font-size:.78rem;font-family:'Inter',sans-serif;transition:all .2s}
.sn:hover{color:#aaa;border-color:rgba(255,255,255,.3)}
.sn.active{background:rgba(233,69,96,.15);color:var(--red);border-color:rgba(233,69,96,.4)}
.content{flex:1;padding:20px;overflow-y:auto}
.tab-panel{display:none}.tab-panel.active{display:block}
.section-title{font-size:.72rem;color:#444;text-transform:uppercase;letter-spacing:2px;
  padding:10px 0 12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.05)}
.section-badge{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3);
  color:var(--red);border-radius:50px;padding:2px 10px;font-size:.65rem;font-weight:600}
.match-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.match-card{background:var(--glass);border:1px solid var(--gborder);backdrop-filter:blur(14px);
  border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;
  transition:all .25s;position:relative;overflow:hidden}
.match-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(233,69,96,.4),transparent);opacity:0}
.match-card:hover{border-color:rgba(233,69,96,.3);box-shadow:0 8px 32px rgba(0,0,0,.4),var(--gr);transform:translateY(-2px)}
.match-card:hover::before{opacity:1}
.match-card.live{border-color:rgba(46,204,113,.3);animation:pulse-b 2s infinite}
@keyframes pulse-b{0%,100%{border-color:rgba(46,204,113,.3)}50%{border-color:rgba(46,204,113,.6)}}
.match-competition{font-size:.6rem;color:#444;text-transform:uppercase;letter-spacing:1px;
  position:absolute;top:7px;left:18px}
.match-teams{flex:1;display:flex;flex-direction:column;gap:7px;margin-top:11px}
.team-row{display:flex;align-items:center;justify-content:space-between}
.team-name{font-size:.88rem;font-weight:600;color:#ccc}
.team-score{font-size:1.1rem;font-weight:700;color:#fff;min-width:18px;text-align:center}
.team-row.winner .team-name{color:#fff}.team-row.winner .team-score{color:var(--green)}
.match-status{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-width:56px;text-align:center;padding:5px 8px;border-radius:9px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.status-time{font-size:.78rem;font-weight:700;color:#aaa}
.status-live{font-size:.6rem;color:var(--green);font-weight:600;
  background:rgba(46,204,113,.12);padding:1px 5px;border-radius:20px;margin-top:2px;
  animation:blink .8s infinite alternate}
@keyframes blink{from{opacity:.6}to{opacity:1}}
.status-ft{font-size:.6rem;color:#555}.status-pre{font-size:.6rem;color:#555}

/* BTN ANALIZAR IA — replaces btn-pick */
.btn-ai-analyze{
  padding:8px 14px;
  background:linear-gradient(135deg,rgba(233,69,96,0.2),rgba(240,165,0,0.15));
  border:1px solid rgba(233,69,96,0.45);
  color:var(--gold);border-radius:10px;cursor:pointer;
  font-size:.75rem;font-weight:700;font-family:'Inter',sans-serif;
  transition:all .25s;white-space:nowrap;flex-shrink:0;letter-spacing:.5px;
  box-shadow:0 0 10px rgba(233,69,96,.15)
}
.btn-ai-analyze:hover{
  background:linear-gradient(135deg,rgba(233,69,96,0.4),rgba(240,165,0,0.3));
  box-shadow:var(--gr);transform:scale(1.04);color:#fff
}

/* ══ AI PICKS MODAL ══ */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(10px);
  display:flex;align-items:flex-start;justify-content:center;z-index:999;overflow-y:auto;padding:20px}
.modal.hidden{display:none}

.ai-modal-box{
  background:linear-gradient(145deg,rgba(14,20,40,.97),rgba(6,6,15,.99));
  border:1px solid rgba(233,69,96,.25);border-radius:22px;
  width:700px;max-width:98vw;
  box-shadow:0 0 80px rgba(233,69,96,.18),0 30px 60px rgba(0,0,0,.6);
  overflow:hidden;margin:auto
}

.ai-modal-header{
  padding:22px 28px 16px;
  background:linear-gradient(135deg,rgba(233,69,96,.1),rgba(240,165,0,.06));
  border-bottom:1px solid rgba(255,255,255,.06);
  display:flex;justify-content:space-between;align-items:flex-start
}
.ai-modal-title{font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:4px}
.ai-modal-sub{font-size:.72rem;color:#555;letter-spacing:1px;text-transform:uppercase}
.ai-modal-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:linear-gradient(135deg,rgba(233,69,96,.2),rgba(240,165,0,.2));
  border:1px solid rgba(240,165,0,.35);border-radius:50px;
  padding:5px 14px;font-size:.72rem;color:var(--gold);font-weight:700;letter-spacing:1px
}
.btn-close-modal{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#666;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.btn-close-modal:hover{background:#e74c3c;color:#fff;border-color:#e74c3c}

.ai-modal-body{padding:20px 28px 28px}

/* MARKET CARD */
.market-card{
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:18px 20px;margin-bottom:14px;
  transition:all .25s;position:relative;overflow:hidden
}
.market-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--red);border-radius:16px 0 0 16px
}
.market-card.low::before{background:var(--green)}
.market-card.mid::before{background:var(--gold)}
.market-card.high::before{background:#e67e22}
.market-card.extreme::before{background:#e74c3c}
.market-card:hover{border-color:rgba(233,69,96,.25);background:rgba(255,255,255,.05)}

.market-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.market-type{font-size:.68rem;color:var(--red);text-transform:uppercase;
  letter-spacing:2px;font-weight:600;display:flex;align-items:center;gap:6px}
.market-type-icon{font-size:1rem}

/* ODDS ROW */
.odds-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.odd-chip{
  flex:1;min-width:80px;padding:10px 8px;
  background:rgba(15,52,96,.35);border:1px solid rgba(15,52,96,.6);
  border-radius:10px;text-align:center;cursor:pointer;transition:all .2s
}
.odd-chip:hover{background:rgba(15,52,96,.6);border-color:rgba(233,69,96,.4)}
.odd-chip.recommended{
  background:linear-gradient(135deg,rgba(233,69,96,.2),rgba(240,165,0,.15));
  border-color:rgba(240,165,0,.5);
  box-shadow:0 0 14px rgba(240,165,0,.2)
}
.odd-name{font-size:.68rem;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.odd-value{font-size:1.05rem;font-weight:700;color:#fff}
.odd-chip.recommended .odd-value{color:var(--gold)}
.odd-label{font-size:.6rem;color:var(--red);margin-top:3px;font-weight:600}

/* RISK ROW */
.risk-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.risk-lbl{font-size:.65rem;color:#444;text-transform:uppercase;letter-spacing:1px}
.stars{display:flex;gap:2px}
.stars .s{font-size:.9rem;filter:grayscale(1);opacity:.2}
.stars .s.on{filter:none;opacity:1;text-shadow:0 0 6px currentColor}
.r1 .s.on{color:var(--green)}.r2 .s.on{color:#a8e063}
.r3 .s.on{color:var(--gold)}.r4 .s.on{color:#e67e22}.r5 .s.on{color:#e74c3c}
.rdesc{font-size:.65rem;padding:2px 8px;border-radius:20px;font-weight:600}
.r1 .rdesc{background:rgba(46,204,113,.12);color:var(--green)}
.r2 .rdesc{background:rgba(168,224,99,.12);color:#a8e063}
.r3 .rdesc{background:rgba(240,165,0,.12);color:var(--gold)}
.r4 .rdesc{background:rgba(230,126,34,.12);color:#e67e22}
.r5 .rdesc{background:rgba(231,76,60,.12);color:#e74c3c}

/* AI ANALYSIS */
.ai-analysis-box{
  background:linear-gradient(135deg,rgba(6,6,15,.8),rgba(15,52,96,.2));
  border:1px solid rgba(15,52,96,.5);border-radius:10px;
  padding:12px 14px;margin-bottom:12px
}
.ai-analysis-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,rgba(233,69,96,.15),rgba(240,165,0,.15));
  border:1px solid rgba(233,69,96,.25);border-radius:20px;
  padding:2px 8px;font-size:.6rem;color:var(--gold);font-weight:600;
  margin-bottom:6px;letter-spacing:.5px
}
.ai-text{font-size:.78rem;color:#aaa;line-height:1.6;margin-bottom:8px}
.ai-conclusion{
  font-size:.78rem;font-weight:600;
  padding:8px 12px;border-radius:8px;
  background:rgba(233,69,96,.08);border-left:3px solid var(--red);color:#ccc
}
.ai-conclusion strong{color:var(--red)}

/* ADD PICK BTN */
.btn-add-this{
  width:100%;padding:10px;
  background:linear-gradient(135deg,var(--red),#c0392b);
  color:#fff;border:none;border-radius:9px;
  font-size:.82rem;font-family:'Inter',sans-serif;font-weight:700;
  cursor:pointer;box-shadow:var(--gr);transition:all .2s;margin-top:4px
}
.btn-add-this:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(233,69,96,.7)}
.btn-add-this.added{background:linear-gradient(135deg,#27ae60,var(--green));box-shadow:0 0 20px rgba(46,204,113,.4)}

/* PICKS SECTION */
.picks-panel{padding:20px}
.pick-card{background:var(--glass);border:2px solid var(--gborder);border-radius:14px;
  padding:18px;margin-bottom:14px;position:relative;overflow:hidden;transition:all .3s}
.pick-card:hover{border-color:rgba(233,69,96,.3);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.pick-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;
  background:var(--red);border-radius:14px 0 0 14px}
.pick-card.ganado{border:2px solid #2ecc71 !important;box-shadow:0 0 18px rgba(46,204,113,.35)}
.pick-card.ganado::before{background:#2ecc71}
.pick-card.perdido{border:2px solid #e74c3c !important;box-shadow:0 0 18px rgba(231,76,60,.30)}
.pick-card.perdido::before{background:#e74c3c}
.pick-result-badge{position:absolute;top:12px;right:12px;padding:4px 12px;border-radius:99px;
  font-size:.68rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase}
.pick-result-badge.g{background:rgba(46,204,113,.18);color:#2ecc71;border:1px solid rgba(46,204,113,.4)}
.pick-result-badge.p{background:rgba(231,76,60,.18);color:#e74c3c;border:1px solid rgba(231,76,60,.4)}
.pc-liga{font-size:.62rem;color:var(--red);text-transform:uppercase;letter-spacing:2px;margin-bottom:5px}
.pc-partido{font-size:.95rem;font-weight:600;margin-bottom:10px;color:#eee}
.pc-hl{background:rgba(15,52,96,.5);border:1px solid rgba(15,52,96,.7);border-radius:7px;
  padding:8px 12px;margin-bottom:10px;font-size:.85rem}
.pc-hl strong{color:var(--gold)}
.pc-meta{display:flex;gap:8px;margin-bottom:10px}
.pc-chip{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
  border-radius:7px;padding:6px;text-align:center}
.pc-chip .cv{font-size:1rem;font-weight:700;color:var(--gold)}.pc-chip .cl{font-size:.6rem;color:#444;text-transform:uppercase}
.pc-risk{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.pc-risk .rl{font-size:.65rem;color:#444;text-transform:uppercase;letter-spacing:1px}
.ai-box{background:rgba(15,52,96,.2);border:1px solid rgba(15,52,96,.4);
  border-radius:8px;padding:10px 12px;margin-bottom:10px;font-size:.75rem;color:#888;line-height:1.5}
.pc-foot{display:flex;justify-content:space-between;align-items:center;
  padding-top:10px;border-top:1px solid rgba(255,255,255,.04)}
.badge{padding:4px 10px;border-radius:50px;font-size:.7rem;font-weight:600}
.badge.pendiente{background:rgba(240,165,0,.12);color:var(--gold);border:1px solid rgba(240,165,0,.25)}
.badge.ganado{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}
.badge.perdido{background:rgba(231,76,60,.12);color:#e74c3c;border:1px solid rgba(231,76,60,.25)}
.foot-btns{display:flex;gap:5px}
.btn-res{padding:4px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  color:#666;border-radius:7px;cursor:pointer;font-size:.7rem;font-family:'Inter',sans-serif;transition:all .2s}
.btn-res:hover{background:var(--red);color:#fff;border-color:var(--red)}
.btn-del{padding:4px 7px;background:transparent;border:none;color:#333;cursor:pointer;transition:color .2s}
.btn-del:hover{color:#e74c3c}
.modal-res .mbox{width:340px;text-align:center;background:linear-gradient(145deg,rgba(22,33,62,.96),rgba(6,6,15,.98));
  border:1px solid rgba(233,69,96,.3);border-radius:20px;padding:28px;box-shadow:0 0 60px rgba(233,69,96,.2)}
.modal-res .mbox p{color:#aaa;margin-bottom:20px;font-size:.88rem}
.modal-res .mbox h2{font-size:1.1rem;margin-bottom:10px}
.res-btns{display:flex;gap:10px;justify-content:center}
.btn-win{padding:11px 20px;background:linear-gradient(135deg,#27ae60,var(--green));color:#fff;
  border:none;border-radius:9px;font-size:.95rem;font-family:'Inter',sans-serif;font-weight:700;
  cursor:pointer;box-shadow:0 0 16px rgba(46,204,113,.35)}
.btn-lose{padding:11px 20px;background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;
  border:none;border-radius:9px;font-size:.95rem;font-family:'Inter',sans-serif;font-weight:700;
  cursor:pointer;box-shadow:0 0 16px rgba(231,76,60,.35)}
.btn-cancel-sm{padding:10px;width:100%;margin-top:8px;background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1);color:#555;border-radius:9px;cursor:pointer;font-family:'Inter',sans-serif}
.add-pick-fab{position:fixed;bottom:28px;right:28px;z-index:40;
  width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--red),#c0392b);
  border:none;color:#fff;font-size:1.5rem;cursor:pointer;
  box-shadow:var(--gr),0 8px 24px rgba(0,0,0,.4);transition:all .2s;
  display:flex;align-items:center;justify-content:center}
.add-pick-fab:hover{transform:scale(1.1);box-shadow:0 0 40px rgba(233,69,96,.7)}
.loader{text-align:center;padding:60px;color:#333}
.loader-spin{display:inline-block;width:36px;height:36px;border:3px solid rgba(233,69,96,.2);
  border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader p{font-size:.85rem;color:#444}
.no-games{text-align:center;padding:40px;color:#333;font-size:.85rem}
.no-games-icon{font-size:2.5rem;margin-bottom:8px;opacity:.3}
footer{position:relative;z-index:5;text-align:center;padding:18px;
  background:rgba(0,0,0,.4);color:#2a2a2a;font-size:.72rem;
  border-top:1px solid rgba(255,255,255,.04)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(233,69,96,.25);border-radius:10px}
</style>
</head>
<body>

<header>
  <div class="logo">GqvvsPicks</div>
  <div class="logo-sub">AI · Live Picks · Sports Analysis</div>
  <div class="stats-bar">
    <div class="sp"><span class="v" id="st-total">0</span><span class="l">Total</span></div>
    <div class="sp g"><span class="v" id="st-ganados">0</span><span class="l">Ganados</span></div>
    <div class="sp p"><span class="v" id="st-perdidos">0</span><span class="l">Perdidos</span></div>
    <div class="sp w"><span class="v" id="st-wr">0%</span><span class="l">Win Rate</span></div>
  </div>
</header>

<div class="main-tabs">
  <button class="mt active" onclick="switchTab('futbol',this)">⚽ Fútbol</button>
  <button class="mt" onclick="switchTab('mlb',this)">⚾ MLB</button>

<script>
// ═══════════════════════════════════════════════
// LEAGUES CONFIG
// ═══════════════════════════════════════════════
const BASE = 'https://site.api.espn.com/apis/site/v2/sports';
const LEAGUES = {
  mexico:[
    {slug:'mex.1',name:'Liga MX',flag:'🇲🇽'},
    {slug:'mex.copa_mx',name:'Copa MX',flag:'🇲🇽'},
    {slug:'concacaf.leagues',name:'CONCACAF Champions',flag:'🌎'},
  ],
  brasil:[
    {slug:'bra.1',name:'Brasileirão Série A',flag:'🇧🇷'},
    {slug:'bra.2',name:'Brasileirão Série B',flag:'🇧🇷'},
    {slug:'bra.3',name:'Brasileirão Série C',flag:'🇧🇷'},
    {slug:'conmebol.libertadores',name:'Copa Libertadores',flag:'🏆'},
    {slug:'conmebol.sudamericana',name:'Copa Sudamericana',flag:'🏆'},
  ],
  mls:[{slug:'usa.1',name:'MLS',flag:'🇺🇸'},{slug:'usa.open',name:'US Open Cup',flag:'🇺🇸'}],
  espana:[{slug:'esp.1',name:'La Liga',flag:'🇪🇸'},{slug:'esp.copa_del_rey',name:'Copa del Rey',flag:'🇪🇸'}],
  francia:[{slug:'fra.1',name:'Ligue 1',flag:'🇫🇷'},{slug:'fra.coupe_de_france',name:'Coupe de France',flag:'🇫🇷'}],
  italia:[{slug:'ita.1',name:'Serie A',flag:'🇮🇹'},{slug:'ita.coppa_italia',name:'Coppa Italia',flag:'🇮🇹'}],
  alemania:[{slug:'ger.1',name:'Bundesliga',flag:'🇩🇪'},{slug:'ger.dfb_pokal',name:'DFB-Pokal',flag:'🇩🇪'}],
  inglaterra:[{slug:'eng.1',name:'Premier League',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{slug:'eng.fa',name:'FA Cup',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{slug:'eng.league_cup',name:'Carabao Cup',flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'}],
  portugal:[{slug:'por.1',name:'Primeira Liga',flag:'🇵🇹'},{slug:'por.cup',name:'Taça de Portugal',flag:'🇵🇹'}],
  uefa:[{slug:'uefa.champions',name:'Champions League',flag:'⭐'},{slug:'uefa.europa',name:'Europa League',flag:'🟠'},{slug:'uefa.europa.conference',name:'Conference League',flag:'🟢'}],
  selecciones:[
    {slug:'fifa.friendly',name:'Amistosos Internacionales',flag:'🌍'},
    {slug:'fifa.worldq.concacaf',name:'Clasif. CONCACAF',flag:'🌎'},
    {slug:'fifa.worldq.conmebol',name:'Clasif. CONMEBOL',flag:'🌎'},
    {slug:'fifa.worldq',name:'Repechaje Mundial',flag:'🏆'},
  ],
};
const ALL_SOCCER = Object.values(LEAGUES).flat();

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let selectedDate = new Date();
let calYear = selectedDate.getFullYear(), calMonth = selectedDate.getMonth();
let currentGroup = 'all', currentTab = 'futbol';
let picks = JSON.parse(localStorage.getItem('gqvvspicks_v4')) || [];
let pickIdActual = null;
let futbolData = {};
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];

// ═══════════════════════════════════════════════
// CALENDAR
// ═══════════════════════════════════════════════
function fmtDisplay(d){ return DAYS[d.getDay()]+' '+d.getDate()+' de '+MONTHS[d.getMonth()]+' '+d.getFullYear(); }
function fmtESPN(d){ return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }

function renderCalendar(){
  document.getElementById('cal-title').textContent = MONTHS[calMonth]+' '+calYear;
  const grid = document.getElementById('cal-grid');
  const today = new Date(); today.setHours(0,0,0,0);
  const sel = new Date(selectedDate); sel.setHours(0,0,0,0);
  let html = DAYS.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const first = new Date(calYear,calMonth,1);
  const last  = new Date(calYear,calMonth+1,0);
  for(let i=0;i<first.getDay();i++) html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dt=new Date(calYear,calMonth,d); let cls='cal-day';
    if(dt.getTime()===today.getTime()) cls+=' today';
    if(dt.getTime()===sel.getTime()) cls+=' selected';
    html+=`<div class="${cls}" onclick="selectDate(${calYear},${calMonth},${d})">${d}</div>`;
  }
  grid.innerHTML=html;
  document.getElementById('date-display-text').textContent=fmtDisplay(selectedDate);
}
function selectDate(y,m,d){ selectedDate=new Date(y,m,d); calYear=y; calMonth=m; renderCalendar(); loadCurrentTab(); }
function prevMonth(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); }
function nextMonth(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); }

// ═══════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll('.mt').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('futbol-subnav').style.display=tab==='futbol'?'flex':'none';
  if(tab==='picks') renderPicks(); else loadCurrentTab();
}
function setGroup(g,btn){ currentGroup=g; document.querySelectorAll('.sn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderFutbol(); }
function loadCurrentTab(){ if(currentTab==='futbol') fetchFutbol(); else if(currentTab==='mlb') fetchMLB(); else if(currentTab==='nba') fetchNBA(); }

// ═══════════════════════════════════════════════
// FETCH ESPN
// ═══════════════════════════════════════════════
async function fetchLeague(sport,slug,dateStr){
  try{
    const r=await fetch(`${BASE}/${sport}/${slug}/scoreboard?dates=${dateStr}&limit=50`);
    if(!r.ok) return [];
    const data=await r.json();
    return (data.events||[]).map(ev=>{
      const comp=ev.competitions?.[0];
      const home=comp?.competitors?.find(c=>c.homeAway==='home');
      const away=comp?.competitors?.find(c=>c.homeAway==='away');
      const status=comp?.status?.type;
      return{id:ev.id,name:ev.name||'',competition:slug,
        home:home?.team?.displayName||home?.team?.name||'Local',
        away:away?.team?.displayName||away?.team?.name||'Visitante',
        homeScore:home?.score||'',awayScore:away?.score||'',
        homeWinner:home?.winner||false,awayWinner:away?.winner||false,
        statusName:status?.name||'',statusShort:status?.shortDetail||status?.description||'',
        isLive:status?.state==='in',isPost:status?.completed||status?.name==='post',date:ev.date||''};
    });
  }catch(e){return[];}
}

async function fetchFutbol(){
  const panel=document.getElementById('tab-futbol');
  panel.innerHTML=`<div class="loader"><div class="loader-spin"></div><p>Cargando partidos...</p></div>`;
  const dateStr=fmtESPN(selectedDate); futbolData={};
  const results=await Promise.allSettled(ALL_SOCCER.map(lg=>fetchLeague('soccer',lg.slug,dateStr).then(games=>({lg,games}))));
  results.forEach(r=>{ if(r.status==='fulfilled'&&r.value.games.length>0) futbolData[r.value.lg.slug]={...r.value.lg,games:r.value.games}; });
  updateSubnavButtons();
  renderFutbol();
}

function updateSubnavButtons(){
  const groups=['mexico','brasil','mls','espana','francia','italia','alemania','inglaterra','portugal','uefa','selecciones'];
  groups.forEach(gKey=>{
    const btn=document.querySelector(`button[data-group="${gKey}"]`);
    if(!btn) return;
    const hasGames=(LEAGUES[gKey]||[]).some(lg=>futbolData[lg.slug]);
    btn.style.display=hasGames?'':'none';
    if(!hasGames&&currentGroup===gKey){
      currentGroup='all';
      document.querySelectorAll('.sn').forEach(b=>b.classList.remove('active'));
      document.querySelector('button[data-group="all"]').classList.add('active');
    }
  });
}
function renderFutbol(){
  const panel=document.getElementById('tab-futbol');
  const groups=currentGroup==='all'?Object.keys(LEAGUES):[currentGroup];
  let html='',total=0;
  groups.forEach(gKey=>{
    (LEAGUES[gKey]||[]).forEach(lg=>{
      const entry=futbolData[lg.slug];
      if(!entry||!entry.games.length) return;
      html+=`<div class="section-title">${lg.flag} ${lg.name} <span class="section-badge">${entry.games.length} partidos</span></div>`;
      html+=`<div class="match-grid">${entry.games.map(g=>matchCardHTML(g,lg.name,'soccer',lg.slug)).join('')}</div>`;
      total+=entry.games.length;
    });
  });
  panel.innerHTML = html
    ? `<p style="color:#444;font-size:.72rem;margin-bottom:16px;text-align:right">${total} partidos · ${fmtDisplay(selectedDate)}</p>${html}`
    : `<div class="no-games"><div class="no-games-icon">⚽</div><p>No hay partidos para este día en las ligas seleccionadas</p></div>`;
  const allFutbolGames=Object.values(futbolData).flatMap(e=>e.games||[]);
  autoEvalGames(allFutbolGames);
}

async function fetchMLB(){
  const panel=document.getElementById('tab-mlb');
  panel.innerHTML=`<div class="loader"><div class="loader-spin"></div><p>Cargando MLB + KBO...</p></div>`;
  const dateStr=fmtESPN(selectedDate);
  let mlbGames=[], kboGames=[];

  // MLB desde ESPN
  try{
    const r=await fetch(`${BASE}/baseball/mlb/scoreboard?dates=${dateStr}&limit=20`);
    const d=await r.json();
    mlbGames=(d.events||[]).map(ev=>{
      const comp=ev.competitions?.[0];
      const home=comp?.competitors?.find(c=>c.homeAway==='home');
      const away=comp?.competitors?.find(c=>c.homeAway==='away');
      const status=comp?.status?.type;
      return{id:ev.id,name:ev.name||'',competition:'mlb',
        home:home?.team?.displayName||'Local',away:away?.team?.displayName||'Visitante',
        homeScore:home?.score||'',awayScore:away?.score||'',
        homeWinner:home?.winner||false,awayWinner:away?.winner||false,
        statusName:status?.name||'',statusShort:status?.shortDetail||status?.description||'',
        isLive:status?.state==='in',isPost:status?.completed||status?.name==='post',
        date:ev.date||'',sport:'baseball',league:'MLB'};
    });
  }catch(e){}

  // KBO desde SofaScore
  try{
    const today=new Date(selectedDate||Date.now()).toISOString().slice(0,10);
    const r=await fetch(`https://api.sofascore.com/api/v1/sport/baseball/scheduled-events/${today}`,
      {headers:{'Origin':'https://www.sofascore.com','Referer':'https://www.sofascore.com/'},
       signal:AbortSignal.timeout(6000)});
    const all=(await r.json()).events||[];
    kboGames=all
      .filter(e=>e.tournament?.name==='KBO League')
      .map(ev=>({
        id:'sf_'+ev.id, name:ev.homeTeam?.name+' vs '+ev.awayTeam?.name, competition:'kbo',
        home:ev.homeTeam?.name||'Local', away:ev.awayTeam?.name||'Visitante',
        homeScore:ev.homeScore?.current??'', awayScore:ev.awayScore?.current??'',
        homeWinner:ev.winnerCode===1, awayWinner:ev.winnerCode===2,
        statusName:ev.status?.description||'', statusShort:ev.status?.description||'',
        isLive:ev.status?.type==='inprogress', isPost:ev.status?.type==='finished',
        date:ev.startTimestamp?new Date(ev.startTimestamp*1000).toISOString():'',
        sport:'baseball', league:'KBO', sofaId:ev.id,
      }));
  }catch(e){}

  let html='';
  if(mlbGames.length)
    html+=`<div class="section-title">⚾ MLB <span class="section-badge">${mlbGames.length} juegos</span></div>
      <div class="match-grid">${mlbGames.map(g=>matchCardHTML(g,'MLB','baseball','mlb')).join('')}</div>`;
  if(kboGames.length)
    html+=`<div class="section-title" style="margin-top:16px">🇰🇷 KBO League <span class="section-badge">${kboGames.length} juegos</span></div>
      <div class="match-grid">${kboGames.map(g=>matchCardHTML(g,'KBO','baseball','kbo')).join('')}</div>`;
  if(!html)
    html=`<div class="no-games"><div class="no-games-icon">⚾</div><p>No hay juegos MLB/KBO disponibles hoy</p></div>`;
  panel.innerHTML=html;
  autoEvalGames([...mlbGames,...kboGames]);
}
async function fetchNBA(){
  const panel=document.getElementById('tab-nba');
  panel.innerHTML=`<div class="loader"><div class="loader-spin"></div><p>Cargando NBA...</p></div>`;
  const dateStr=fmtESPN(selectedDate);
  try{
    const r=await fetch(`${BASE}/basketball/nba/scoreboard?dates=${dateStr}&limit=20`);
    if(!r.ok) throw new Error('ESPN NBA error');
    const d=await r.json();
    const games=(d.events||[]).map(ev=>{
      const comp=ev.competitions?.[0];
      const home=comp?.competitors?.find(c=>c.homeAway==='home');
      const away=comp?.competitors?.find(c=>c.homeAway==='away');
      const status=comp?.status?.type;
      return{id:ev.id,name:ev.name||'',competition:'nba',
        home:home?.team?.displayName||home?.team?.name||'Local',
        away:away?.team?.displayName||away?.team?.name||'Visitante',
        homeScore:home?.score||'',awayScore:away?.score||'',
        homeWinner:home?.winner||false,awayWinner:away?.winner||false,
        statusName:status?.name||'',statusShort:status?.shortDetail||status?.description||'',
        isLive:status?.state==='in',isPost:status?.completed||status?.name==='post',
        date:ev.date||''};
    });
    const _nbaGames=games;
    panel.innerHTML=games.length
      ?`<div class="section-title">🏀 NBA <span class="section-badge">${games.length} juegos</span></div><div class="match-grid">${games.map(g=>matchCardHTML(g,'NBA','basketball','nba')).join('')}</div>`
      :`<div class="no-games"><div class="no-games-icon">🏀</div><p>No hay juegos NBA hoy</p></div>`;
  autoEvalGames(_nbaGames);
  }catch(e){
    panel.innerHTML=`<div class="no-games"><div class="no-games-icon">🏀</div><p>No hay juegos NBA disponibles</p></div>`;
  }
}
// ═══════════════════════════════════════════════
// MATCH CARD
// ═══════════════════════════════════════════════
function matchCardHTML(g,leagueName,sport,lgSlug){
  const hasScore=g.isLive||g.isPost;
  let statusHTML='';
  if(g.isLive){
    statusHTML=`<div class="match-status"><div class="status-time">${g.statusShort||'LIVE'}</div><div class="status-live">EN VIVO</div></div>`;
  }else if(g.isPost){
    statusHTML=`<div class="match-status"><div class="status-time">${hasScore?g.homeScore+'-'+g.awayScore:'FT'}</div><div class="status-ft">Finalizado</div></div>`;
  }else{
    const t=g.date?new Date(g.date).toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:'America/Tijuana'}):'--:--';
    statusHTML=`<div class="match-status"><div class="status-time">${t}</div><div class="status-pre">Por jugar</div></div>`;
  }
  const gData=JSON.stringify({home:g.home,away:g.away,liga:leagueName,sport,competition:lgSlug||""}).replace(/'/g,"&#39;");
  return `
  <div class="match-card ${g.isLive?'live':''}">
    <div class="match-competition">${leagueName}</div>
    <div class="match-teams">
      <div class="team-row ${g.homeWinner?'winner':''}">
        <span class="team-name">${g.home}</span>${hasScore?`<span class="team-score">${g.homeScore}</span>`:''}
      </div>
      <div class="team-row ${g.awayWinner?'winner':''}">
        <span class="team-name">${g.away}</span>${hasScore?`<span class="team-score">${g.awayScore}</span>`:''}
      </div>
    </div>
    ${statusHTML}
    <button class="btn-ai-analyze" onclick='abrirAI(${gData})'>🤖 IA Picks</button>
  </div>`;
}

// ═══════════════════════════════════════════════
// AI PICKS MODAL
// ═══════════════════════════════════════════════
function hash(str){
  let h=5381;
  for(let i=0;i<str.length;i++) h=((h<<5)+h)+str.charCodeAt(i)|0;
  return Math.abs(h);
}

function seededRand(seed,min,max){
  const x=Math.sin(seed)*10000;
  return min+((x-Math.floor(x))*(max-min));
}

function fmtOdd(v){ return v>=2?'+'+Math.round((v-1)*100):'-'+Math.round(100/(v-1)); }
function fmtDec(v){ return v.toFixed(2); }

// ── SOFASCORE — directo del browser, sin key, todos los partidos ────────────
const SF = {
  hdr: {'Origin':'https://www.sofascore.com','Referer':'https://www.sofascore.com/'},
  base: 'https://api.sofascore.com/api/v1',
};
function normT(s){
  return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/\b(fc|cf|sc|ac|cd|ud|rc|sd|real|atletico|athletic|sporting|club)\b/g,'')
    .replace(/[^a-z0-9]/g,'').trim();
}
function teamOk(a,b){
  const na=normT(a),nb=normT(b);
  if(!na||!nb)return false;
  if(na===nb)return true;
  const L=Math.min(na.length,nb.length,5);
  return na.slice(0,L)===nb.slice(0,L)||na.includes(nb.slice(0,5))||nb.includes(na.slice(0,5));
}
function fracDec(f){
  if(!f)return null;
  const p=String(f).split('/');
  if(p.length!==2)return null;
  return Math.round((parseInt(p[0])/parseInt(p[1])+1)*100)/100;
}
let _sfCache={};

// ── SOCCER odds ───────────────────────────────────────────────────────────────
async function fetchSofaOdds(home, away){
  try{
    const today=new Date().toISOString().slice(0,10);
    const tmr=new Date(Date.now()+86400000).toISOString().slice(0,10);
    let ev=null;
    for(const d of [today,tmr]){
      if(!_sfCache['soc_'+d]){
        const r=await fetch(`${SF.base}/sport/football/scheduled-events/${d}`,
          {headers:SF.hdr,signal:AbortSignal.timeout(6000)});
        _sfCache['soc_'+d]=(await r.json()).events||[];
      }
      ev=_sfCache['soc_'+d].find(e=>teamOk(e.homeTeam?.name,home)&&teamOk(e.awayTeam?.name,away));
      if(ev)break;
    }
    if(!ev)return null;
    const od=(await (await fetch(`${SF.base}/event/${ev.id}/odds/1/all`,{headers:SF.hdr,signal:AbortSignal.timeout(6000)})).json()).markets||[];
    const get=(name,choice)=>fracDec(od.find(m=>m.marketName===name)?.choices?.find(c=>c.name===choice)?.fractionalValue);
    const goalMkts=od.filter(m=>m.marketName==='Match goals');
    let bestGoals=null;
    for(const gm of goalMkts){
      const ov=fracDec(gm.choices?.find(c=>c.name==='Over')?.fractionalValue);
      const un=fracDec(gm.choices?.find(c=>c.name==='Under')?.fractionalValue);
      if(ov&&un&&ov>1.5&&ov<2.8){bestGoals={line:2.5,over:ov,under:un};break;}
    }
    if(!bestGoals&&goalMkts[2]){
      const gm=goalMkts[2];
      const ov=fracDec(gm.choices?.find(c=>c.name==='Over')?.fractionalValue);
      const un=fracDec(gm.choices?.find(c=>c.name==='Under')?.fractionalValue);
      if(ov&&un)bestGoals={line:2.5,over:ov,under:un};
    }
    const cOv=get('Corners 2-Way','Over'),cUn=get('Corners 2-Way','Under');
    const carOv=get('Cards in match','Over'),carUn=get('Cards in match','Under');
    return{
      sport:'soccer',
      h2h:{home:get('Full time','1'),draw:get('Full time','X'),away:get('Full time','2')},
      doubleChance:{'1X':get('Double chance','1X'),'X2':get('Double chance','X2'),'12':get('Double chance','12')},
      goals:bestGoals,
      btts:{yes:get('Both teams to score','Yes'),no:get('Both teams to score','No')},
      corners:cOv?{line:9.5,over:cOv,under:cUn}:null,
      cards:carOv?{line:3.5,over:carOv,under:carUn}:null,
      source:'SofaScore 🟡',
    };
  }catch(e){return null;}
}

// ── NBA odds + player props ───────────────────────────────────────────────────
async function fetchNBAOdds(home, away){
  try{
    const today=new Date().toISOString().slice(0,10);
    const tmr=new Date(Date.now()+86400000).toISOString().slice(0,10);
    let ev=null;
    for(const d of [today,tmr]){
      if(!_sfCache['nba_'+d]){
        const r=await fetch(`${SF.base}/sport/basketball/scheduled-events/${d}`,
          {headers:SF.hdr,signal:AbortSignal.timeout(6000)});
        const all=(await r.json()).events||[];
        _sfCache['nba_'+d]=all.filter(e=>e.tournament?.name==='NBA'||e.tournament?.slug==='nba');
      }
      ev=_sfCache['nba_'+d].find(e=>teamOk(e.homeTeam?.name,home)&&teamOk(e.awayTeam?.name,away));
      if(ev)break;
    }
    if(!ev)return null;

    // Odds + lineups en paralelo
    const [odRes, linRes] = await Promise.allSettled([
      fetch(`${SF.base}/event/${ev.id}/odds/1/all`,{headers:SF.hdr,signal:AbortSignal.timeout(6000)}),
      fetch(`${SF.base}/event/${ev.id}/lineups`,   {headers:SF.hdr,signal:AbortSignal.timeout(6000)}),
    ]);

    const od=(odRes.status==='fulfilled'?(await odRes.value.json()).markets:[]);
    const lin=linRes.status==='fulfilled'?await linRes.value.json():{};

    const get=(name,choice)=>fracDec(od.find(m=>m.marketName===name)?.choices?.find(c=>c.name===choice)?.fractionalValue);
    const getLine=(name)=>od.find(m=>m.marketName===name)?.choices?.[0]?.name;

    // Spread
    const spreadMkt=od.find(m=>m.marketName==='Point spread');
    let spread=null;
    if(spreadMkt){
      const hc=spreadMkt.choices?.find(c=>teamOk(c.name.split(')')[1]||c.name, home)||c.name.includes('('));
      const ac=spreadMkt.choices?.find(c=>!c.name.startsWith('(')?false:true);
      // Parsear "(-2.0) Charlotte Hornets"
      const h=spreadMkt.choices?.[0],a=spreadMkt.choices?.[1];
      const hLine=h?.name?.match(/\(([^)]+)\)/)?.[1];
      const aLine=a?.name?.match(/\(([^)]+)\)/)?.[1];
      spread={
        homeLine:hLine, homeOdds:fracDec(h?.fractionalValue),
        awayLine:aLine, awayOdds:fracDec(a?.fractionalValue),
      };
    }

    // Total
    const totalMkt=od.find(m=>m.marketName==='Game total');
    let total=null;
    if(totalMkt){
      const ovRaw=totalMkt.choices?.find(c=>c.name==='Over');
      const unRaw=totalMkt.choices?.find(c=>c.name==='Under');
      // La línea normalmente está en el punto más equilibrado (~225)
      const line=totalMkt.value||225.5;
      total={line,over:fracDec(ovRaw?.fractionalValue),under:fracDec(unRaw?.fractionalValue)};
    }

    // Moneyline
    const ml={
      home:get('Full time','1'), away:get('Full time','2'),
    };

    // Player Props — estrella de cada equipo (más seguidores en SofaScore)
    const getStar=players=>{
      if(!players?.length)return null;
      return [...players].sort((a,b)=>(b.player?.userCount||0)-(a.player?.userCount||0))[0]?.player;
    };
    const homeStar=getStar(lin.home?.players);
    const awayStar=getStar(lin.away?.players);

    // Obtener stats de temporada del jugador estrella
    async function getPlayerPPG(player){
      if(!player?.id)return null;
      try{
        const sr=await fetch(`${SF.base}/player/${player.id}/statistics/seasons`,{headers:SF.hdr,signal:AbortSignal.timeout(5000)});
        const sd=await sr.json();
        const nbaEntry=sd.uniqueTournamentSeasons?.find(x=>x.uniqueTournament?.name==='NBA');
        if(!nbaEntry)return null;
        const seasonId=nbaEntry.seasons?.[0]?.id;
        const utId=nbaEntry.uniqueTournament?.id;
        if(!seasonId||!utId)return null;
        const sr2=await fetch(`${SF.base}/player/${player.id}/unique-tournament/${utId}/season/${seasonId}/statistics/regularSeason`,{headers:SF.hdr,signal:AbortSignal.timeout(5000)});
        const st=(await sr2.json()).statistics||{};
        const g=st.appearances||1;
        return{
          name:player.name||player.shortName,
          pts:st.points?Math.round(st.points/g*10)/10:null,
          ast:st.assists?Math.round(st.assists/g*10)/10:null,
          reb:st.rebounds?Math.round(st.rebounds/g*10)/10:null,
        };
      }catch(e){return null;}
    }

    const [hProps,aProps]=await Promise.all([getPlayerPPG(homeStar),getPlayerPPG(awayStar)]);

    return{sport:'nba', ml, spread, total, hProps, aProps, source:'SofaScore 🟡'};
  }catch(e){return null;}
}


// ── BASEBALL ODDS (MLB + KBO) ─────────────────────────────────────────────────
async function fetchBaseballOdds(home, away, sofaId){
  try{
    const today=new Date().toISOString().slice(0,10);
    const tmr=new Date(Date.now()+86400000).toISOString().slice(0,10);
    let ev=null, evId=sofaId||null;

    if(!evId){
      for(const d of [today,tmr]){
        if(!_sfCache['bb_'+d]){
          const r=await fetch(`${SF.base}/sport/baseball/scheduled-events/${d}`,
            {headers:SF.hdr,signal:AbortSignal.timeout(6000)});
          _sfCache['bb_'+d]=(await r.json()).events||[];
        }
        ev=_sfCache['bb_'+d].find(e=>teamOk(e.homeTeam?.name,home)&&teamOk(e.awayTeam?.name,away));
        if(ev){evId=ev.id;break;}
      }
    }
    if(!evId)return null;

    const od=(await(await fetch(`${SF.base}/event/${evId}/odds/1/all`,
      {headers:SF.hdr,signal:AbortSignal.timeout(6000)})).json()).markets||[];

    const get=(name,choice)=>fracDec(od.find(m=>m.marketName===name)?.choices?.find(c=>c.name===choice)?.fractionalValue);
    const ml={home:get('Full time','1'), away:get('Full time','2')};

    // Runline ±1.5 calculado desde ML
    let runline=null;
    if(ml.home&&ml.away){
      const homeProb=(1/ml.home)/((1/ml.home)+(1/ml.away));
      const homeFav=homeProb>0.5;
      // Odds de runline basadas en ML (favorito paga menos en -1.5)
      const favOdds  = homeFav ? Math.round((ml.home+0.55)*100)/100 : Math.round((ml.away+0.55)*100)/100;
      const dogOdds  = homeFav ? Math.round((ml.away-0.55)*100)/100 : Math.round((ml.home-0.55)*100)/100;
      runline={
        homeLine: homeFav?'-1.5':'+1.5', homeOdds: homeFav?favOdds:Math.max(dogOdds,1.3),
        awayLine: homeFav?'+1.5':'-1.5', awayOdds: homeFav?Math.max(dogOdds,1.3):favOdds,
      };
    }

    // O/U total — MLB promedio ~8.5 carreras, KBO ~10.5
    const isKBO=home.length<12&&!['Yankees','Dodgers','Red Sox','Cubs','Mets','Astros','Braves'].some(t=>home.includes(t));
    const ouLine=isKBO?10.5:8.5;
    const ouOdds=1.90; // estándar juice -110 → decimal ~1.90
    const total={line:ouLine, over:ouOdds, under:ouOdds};

    // Team Total (mitad del O/U esperado)
    const teamTotal={
      homeLine: Math.round(ouLine/2*2)/2,  // nearest .5
      awayLine: Math.round(ouLine/2*2)/2,
      odds: 1.90,
    };

    return{sport:'baseball', ml, runline, total, teamTotal, source:'SofaScore 🟡'};
  }catch(e){return null;}
}

// ── AUTO-EVALUACIÓN DE PICKS por marcador final ──────────────────────────────
function normPick(s){ return(s||'').toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function teamInPick(pickStr, teamName){
  const p=normPick(pickStr), t=normPick(teamName);
  return p===t || p.includes(t.slice(0,6)) || t.includes(p.slice(0,6));
}

function autoEvalPick(pk, home, away, hs, as_){
  if(pk.estado!=='Pendiente') return false;
  const h=parseFloat(hs), a=parseFloat(as_);
  if(isNaN(h)||isNaN(a)) return false;
  const pick=normPick(pk.pick);
  const total=h+a, diff=h-a;
  let result=null;

  // 1X2 / Moneyline directo
  if(teamInPick(pick,home) && !pick.match(/[-+]\d/)){
    result = h>a?'Ganado':'Perdido';
  } else if(teamInPick(pick,away) && !pick.match(/[-+]\d/)){
    result = a>h?'Ganado':'Perdido';
  } else if(pick==='empate'||pick==='x'){
    result = h===a?'Ganado':'Perdido';
  }
  // Doble oportunidad
  else if(pick==='1x'){ result = h>=a?'Ganado':'Perdido'; }
  else if(pick==='x2'){ result = a>=h?'Ganado':'Perdido'; }
  else if(pick==='12'){ result = h!==a?'Ganado':'Perdido'; }
  // Over/Under (goles, puntos, carreras)
  else if(pick.startsWith('over ')){
    const line=parseFloat(pick.replace('over ',''));
    if(!isNaN(line)) result = total>line?'Ganado':'Perdido';
  } else if(pick.startsWith('under ')){
    const line=parseFloat(pick.replace('under ',''));
    if(!isNaN(line)) result = total<line?'Ganado':'Perdido';
  }
  // Spread/Runline: "Lakers -4.5" o "Cubs -1.5"
  else {
    const m=pick.match(/^(.+?)\s+([-+]\d+\.?\d*)$/);
    if(m){
      const tn=m[1].trim(), line=parseFloat(m[2]);
      if(teamInPick(tn,home)){
        result=(diff+line)>0?'Ganado':(diff+line)<0?'Perdido':null;
      } else if(teamInPick(tn,away)){
        result=(-diff+line)>0?'Ganado':(-diff+line)<0?'Perdido':null;
      }
    }
  }

  if(result){ pk.estado=result; return true; }
  return false;
}

// Llamar tras cada fetch de resultados finales
function autoEvalGames(games){
  if(!picks.length) return;
  let changed=false;
  games.filter(g=>g.isPost).forEach(g=>{
    const partido1=g.home+' vs '+g.away;
    const partido2=g.away+' vs '+g.home;
    picks.forEach(pk=>{
      if(pk.partido===partido1||pk.partido===partido2){
        if(autoEvalPick(pk, g.home, g.away, g.homeScore, g.awayScore)) changed=true;
      }
    });
  });
  if(changed){ save(); updateStats(); }
}

       pick:`Over ${tot?.line||225.5}`,
       analysis:`${hasTot?`Línea total: ${tot.line} puntos · Over ${fmt(tot.over)} / Under ${fmt(tot.under)}.`:'Sin datos de total disponibles.'} La NBA promedia ~224 pts por partido en temporada 2025-26.`,
       conclusion:`🎯 Pick: <strong>Over ${tot?.line||225.5} puntos totales</strong>`,extra:src},
      // 4️⃣ Player Props
      {id:'props',icon:'⭐',type:'Especiales de Jugador (Player Props)',riesgo:3,riskClass:'mid',riskName:'Medio',
       odds:[],
       pick:hP?`${hP.name} Over ${hP.pts} PTS`:'—',
       analysis: (hP||aP)?[
         hP?`<b>${hP.name}</b> promedia <b>${hP.pts}</b> pts · <b>${hP.ast}</b> ast · <b>${hP.reb}</b> reb por partido esta temporada.`:'',
         aP?`<b>${aP.name}</b> promedia <b>${aP.pts}</b> pts · <b>${aP.ast}</b> ast · <b>${aP.reb}</b> reb por partido.`:'',
       ].filter(Boolean).join('<br>') : 'Cargando stats de jugadores...',
       conclusion: hP?`🎯 Pick sugerido: <strong>${hP.name} Over ${Math.round(hP.pts*0.9)} PTS</strong> (90% de su promedio)`:'🎯 Sin props disponibles.',
       extra:src},
    ];
  }

  // ─── SOCCER MARKETS (default) ─────────────────────────────────────────────
  const h2h=odds?.h2h,goals=odds?.goals,dc=odds?.doubleChance;
  const btts=odds?.btts,corners=odds?.corners,cards=odds?.cards;
  const hasReal=!!(h2h?.home&&h2h?.draw&&h2h?.away);
  const s=hash(home+away+liga);
  const homeAdv=hasReal?(1/h2h.home)/((1/h2h.home)+(1/h2h.draw)+(1/h2h.away)):0.50+seededRand(s,-0.06,0.06);
  const awayStr=hasReal?(1/h2h.away)/((1/h2h.home)+(1/h2h.draw)+(1/h2h.away)):1-homeAdv-0.27;
  const drawP=hasReal?(1/h2h.draw)/((1/h2h.home)+(1/h2h.draw)+(1/h2h.away)):0.27;
  const overP=goals?1/goals.over/(1/goals.over+1/goals.under):seededRand(s+2,0.46,0.56);
  const isHomeFav=homeAdv>=awayStr;
  const fmt=v=>v?v.toFixed(2):'—',am=v=>v?fmtOdd(v):'—';
  const rC=['','low','low','mid','high','extreme'],rN=['','Bajo','Bajo','Medio','Alto','Extremo'];
  const rML=Math.max(homeAdv,awayStr)>0.60?2:Math.max(homeAdv,awayStr)>0.52?3:4;
  const src=odds?.source?`<div style="font-size:.58rem;color:#555;margin-top:4px">📡 ${odds.source}</div>`:'';
  const noData=`<div style="font-size:.65rem;color:#555;padding:6px 0">⚪ Partido no encontrado en SofaScore.</div>`;
  return[
    {id:'ml',icon:'🏆',type:'Resultado Final (1X2)',riesgo:rML,riskClass:rC[rML],riskName:rN[rML],
     odds:hasReal?[{name:home,val:fmt(h2h.home),am:am(h2h.home),recommended:isHomeFav},{name:'Empate',val:fmt(h2h.draw),am:am(h2h.draw),recommended:false},{name:away,val:fmt(h2h.away),am:am(h2h.away),recommended:!isHomeFav}]:[],
     pick:isHomeFav?home:away,analysis:`<b>${isHomeFav?home:away}</b> con ~${Math.round(Math.max(homeAdv,awayStr)*100)}% prob.${hasReal?' Cuotas reales de SofaScore.':''}`,
     conclusion:`🎯 Pick: <strong>Victoria de ${isHomeFav?home:away}</strong>`,extra:hasReal?src:noData},
    {id:'do',icon:'🛡️',type:'Doble Oportunidad',riesgo:1,riskClass:'low',riskName:'Bajo',
     odds:dc?.['1X']?[{name:'1X',val:fmt(dc['1X']),am:am(dc['1X']),recommended:isHomeFav},{name:'X2',val:fmt(dc['X2']),am:am(dc['X2']),recommended:!isHomeFav},{name:'12',val:fmt(dc['12']),am:am(dc['12']),recommended:false}]:[],
     pick:isHomeFav?'1X':'X2',analysis:`Cubre 2 resultados. Prob. ~${Math.round((isHomeFav?homeAdv+drawP:awayStr+drawP)*100)}%.`,
     conclusion:`🎯 Pick: <strong>${isHomeFav?'1X ('+home+' o Empate)':'X2 (Empate o '+away+')'}</strong>`,extra:src},
    {id:'goles',icon:'⚽',type:`Goles O/U ${goals?.line||2.5}`,riesgo:overP>0.60||overP<0.40?2:3,riskClass:overP>0.60||overP<0.40?'low':'mid',riskName:overP>0.60||overP<0.40?'Bajo':'Medio',
     odds:goals?[{name:`Over ${goals.line}`,val:fmt(goals.over),am:am(goals.over),recommended:overP>0.50},{name:`Under ${goals.line}`,val:fmt(goals.under),am:am(goals.under),recommended:overP<=0.50}]:[],
     pick:overP>0.50?`Over ${goals?.line||2.5}`:`Under ${goals?.line||2.5}`,
     analysis:`Over ${goals?.line||2.5}: ~${Math.round(overP*100)}%.${btts?.yes?' BTTS Sí: '+fmt(btts.yes)+' / No: '+fmt(btts.no)+'.':''}`,
     conclusion:`🎯 Pick: <strong>${overP>0.50?`Over ${goals?.line||2.5}`:`Under ${goals?.line||2.5}`} goles</strong>`,extra:src},
    {id:'corners',icon:'🚩',type:`Corners O/U ${corners?.line||9.5}`,riesgo:2,riskClass:'low',riskName:'Bajo',
     odds:corners?[{name:`Over ${corners.line}`,val:fmt(corners.over),am:am(corners.over),recommended:true},{name:`Under ${corners.line}`,val:fmt(corners.under),am:am(corners.under),recommended:false}]:[],
     pick:`Over ${corners?.line||9.5}`,analysis:`${corners?`Línea ${corners.line} · Over ${fmt(corners.over)} / Under ${fmt(corners.under)}.`:'Sin datos de corners.'}`,
     conclusion:`🎯 Pick: <strong>Over ${corners?.line||9.5} corners</strong>`,extra:src},
    {id:'tarjetas',icon:'🟨',type:`Tarjetas O/U ${cards?.line||3.5}`,riesgo:3,riskClass:'mid',riskName:'Medio',
     odds:cards?[{name:`Over ${cards.line}`,val:fmt(cards.over),am:am(cards.over),recommended:true},{name:`Under ${cards.line}`,val:fmt(cards.under),am:am(cards.under),recommended:false}]:[],
     pick:`Over ${cards?.line||3.5}`,analysis:`${cards?`Tarjetas O/U ${cards.line} · Over ${fmt(cards.over)} / Under ${fmt(cards.under)}.`:'Sin datos de tarjetas.'}`,
     conclusion:`🎯 Pick: <strong>Over ${cards?.line||3.5} tarjetas</strong>`,extra:src},
  ];
}

async function abrirAI(g){
  document.getElementById('ai-match-title').textContent=g.home+' vs '+g.away;
  document.getElementById('ai-match-liga').textContent='🏆 '+g.liga;
  document.getElementById('modal-ai').classList.remove('hidden');
  const body=document.getElementById('ai-modal-body');
  const sport=g.sport||g.competition||'soccer';
  const isNBA=sport==='nba'||sport==='basketball';
  const isBB=sport==='baseball'||sport==='mlb'||sport==='kbo';

  const _partido=g.home+' vs '+g.away;
  const render=odds=>{
    body.innerHTML=genMarkets(g.home,g.away,g.liga,odds,isBB?'baseball':isNBA?'nba':'soccer').map(m=>{
      const saved=picks.find(p=>p.partido===_partido&&p.pick===m.pick);
      const est=saved?.estado||null;
      const badge=est==='Ganado'
        ?'<div style="display:inline-flex;padding:3px 11px;border-radius:99px;font-size:.66rem;font-weight:800;letter-spacing:1px;background:rgba(46,204,113,.15);color:#2ecc71;border:1px solid rgba(46,204,113,.4);margin-bottom:7px">✅ GANADO</div>'
        :est==='Perdido'
        ?'<div style="display:inline-flex;padding:3px 11px;border-radius:99px;font-size:.66rem;font-weight:800;letter-spacing:1px;background:rgba(231,76,60,.15);color:#e74c3c;border:1px solid rgba(231,76,60,.4);margin-bottom:7px">❌ PERDIDO</div>'
        :est==='Pendiente'
        ?'<div style="display:inline-flex;padding:3px 11px;border-radius:99px;font-size:.64rem;font-weight:700;background:rgba(255,255,255,.06);color:#888;border:1px solid rgba(255,255,255,.1);margin-bottom:7px">⏳ EN SEGUIMIENTO</div>'
        :'';
      const brd=est==='Ganado'?'border:2px solid #2ecc71;box-shadow:0 0 14px rgba(46,204,113,.25)':est==='Perdido'?'border:2px solid #e74c3c;box-shadow:0 0 14px rgba(231,76,60,.2)':'';
      const btnAdd=saved
        ?`<button class="btn-add-this" disabled style="opacity:.35;cursor:not-allowed">✔ Ya en tu lista</button>`
        :`<button class="btn-add-this" onclick='addPickFromAI(${JSON.stringify({partido:_partido,liga:g.liga,pick:m.pick,cuota:m.odds[0]?.val||"—",riesgo:m.riesgo,analisis:m.analysis.replace(/<[^>]+>/g,"")})})'>➕ Agregar este Pick</button>`;
      return `<div class="market-card ${m.riskClass}" style="${brd}">`
        +`<div class="market-header"><div class="market-type"><span class="market-type-icon">${m.icon}</span>${m.type}</div>`
        +`<div class="risk-row r${m.riesgo}" style="margin:0"><span class="risk-lbl">Riesgo</span><div class="stars">${[1,2,3,4,5].map(i=>`<span class="s ${i<=m.riesgo?'on':''}">★</span>`).join('')}</div><span class="rdesc">${m.riskName}</span></div></div>`
        +(m.odds.length?`<div class="odds-row">${m.odds.map(o=>`<div class="odd-chip ${o.recommended?'recommended':''}"><div class="odd-name">${o.name}</div><div class="odd-value">${o.val}</div><div class="odd-name" style="color:#555">${o.am}</div>${o.recommended?'<div class="odd-label">⭐ Pick</div>':''}</div>`).join('')}</div>`:'')
        +badge
        +`<div class="ai-analysis-box" style="margin-top:${badge?4:10}px"><div class="ai-analysis-badge">🤖 ANÁLISIS IA</div><div class="ai-text">${m.analysis}</div><div class="ai-conclusion" style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.07)">${m.conclusion}</div></div>`
        +(m.extra||'')
        +btnAdd
        +'</div>';
    }).join('');
  };

  body.innerHTML=`<div class="loader"><div class="loader-spin"></div><p style="font-size:.75rem;color:#555;margin-top:8px">${isBB?'Cargando béisbol (MLB/KBO)...':isNBA?'Cargando momios NBA...':'Cargando momios reales...'}</p></div>`;
  if(g.isPost) autoEvalGames([g]);
  const odds=await (isBB?fetchBaseballOdds(g.home,g.away,g.sofaId):isNBA?fetchNBAOdds(g.home,g.away):fetchSofaOdds(g.home,g.away)).catch(()=>null);
  render(odds);
}

function cerrarAI(){ document.getElementById('modal-ai').classList.add('hidden'); }

function addPickFromAI(data){
  picks.unshift({
    id:Date.now(), partido:data.partido, liga:data.liga,
    pick:data.pick, cuota:parseFloat(data.cuota), unidades:1,
    riesgo:data.riesgo, analisis:data.analisis,
    estado:'Pendiente', fecha:new Date().toISOString().split('T')[0]
  });
  save(); updateStats();
  alert('✅ Pick agregado a tu lista');
}

function openManualPick(){ document.getElementById('modal-manual').classList.remove('hidden'); }
function cerrarManual(){ document.getElementById('modal-manual').classList.add('hidden'); }
function analizarManual(){
  const partido=document.getElementById('mp-partido').value.trim();
  const liga=document.getElementById('mp-liga').value;
  if(!partido){alert('Escribe el nombre del partido primero ✋');return;}
  const eq=partido.split(/vs\.?/i);
  cerrarManual();
  abrirAI({home:eq[0]?.trim()||partido,away:eq[1]?.trim()||'Visitante',liga,sport:'soccer'});
}

// ═══════════════════════════════════════════════
// PICKS
// ═══════════════════════════════════════════════
function save(){ localStorage.setItem('gqvvspicks_v4',JSON.stringify(picks)); }

function renderPicks(){
  const p=document.getElementById('tab-picks');
  updateStats();
  if(!picks.length){p.innerHTML=`<div class="no-games"><div class="no-games-icon">🎯</div><p>No hay picks todavía. Haz clic en "🤖 IA Picks" en cualquier partido.</p></div>`;return;}
  const rn=['','Bajo','Leve','Medio','Alto','Extremo'];
  p.innerHTML=picks.map(pk=>{
    const stars=[1,2,3,4,5].map(i=>`<span class="s ${i<=pk.riesgo?'on':''}">★</span>`).join('');
    const est=pk.estado==='Ganado'?'ganado':pk.estado==='Perdido'?'perdido':'pendiente';
    const label=pk.estado==='Ganado'?'✅ Ganado':pk.estado==='Perdido'?'❌ Perdido':'⏳ Pendiente';
    const badgeHTML=pk.estado==='Ganado'?'<div class="pick-result-badge g">✅ GANADO</div>':pk.estado==='Perdido'?'<div class="pick-result-badge p">❌ PERDIDO</div>':'';
    return `
    <div class="pick-card ${est}">
      ${badgeHTML}
      <div class="pc-liga">🏆 ${pk.liga} · ${pk.fecha}</div>
      <div class="pc-partido">${pk.partido}</div>
      <div class="pc-hl">📌 Pick: <strong>${pk.pick}</strong></div>
      <div class="pc-meta">
        <div class="pc-chip"><div class="cv">${pk.cuota}</div><div class="cl">Cuota</div></div>
        <div class="pc-chip"><div class="cv">${pk.unidades}u</div><div class="cl">Unidades</div></div>
      </div>
      <div class="pc-risk r${pk.riesgo}">
        <span class="rl">Riesgo</span>
        <div class="stars">${stars}</div>
        <span class="rdesc">${rn[pk.riesgo]}</span>
      </div>
      <div class="ai-box">
        <div style="font-size:.6rem;color:var(--gold);font-weight:600;margin-bottom:4px;letter-spacing:.5px">🤖 ANÁLISIS IA</div>
        ${pk.analisis}
      </div>
      <div class="pc-foot">
        <span class="badge ${est}">${label}</span>
        <div class="foot-btns">
          ${pk.estado==='Pendiente'?`<button class="btn-res" onclick="abrirRes(${pk.id})">Resultado</button>`:''}
          <button class="btn-del" onclick="eliminar(${pk.id})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function updateStats(){
  const g=picks.filter(p=>p.estado==='Ganado').length;
  const pe=picks.filter(p=>p.estado==='Perdido').length;
  const res=g+pe;
  document.getElementById('st-total').textContent=picks.length;
  document.getElementById('st-ganados').textContent=g;
  document.getElementById('st-perdidos').textContent=pe;
  document.getElementById('st-wr').textContent=(res>0?Math.round(g/res*100):0)+'%';
}

function abrirRes(id){
  pickIdActual=id;
  const pk=picks.find(p=>p.id===id);
  document.getElementById('res-txt').textContent=pk.partido+' — '+pk.pick;
  document.getElementById('modal-res').classList.remove('hidden');
}
function cerrarRes(){ document.getElementById('modal-res').classList.add('hidden'); pickIdActual=null; }
function setRes(r){ picks=picks.map(p=>p.id===pickIdActual?{...p,estado:r}:p); save(); cerrarRes(); renderPicks(); }
function eliminar(id){ if(confirm('¿Eliminar pick?')){picks=picks.filter(p=>p.id!==id);save();renderPicks();} }

// INIT
// ═══════════════════════════════════════════════
document.getElementById('futbol-subnav').style.display='flex';
renderCalendar();
updateStats();
fetchFutbol();
